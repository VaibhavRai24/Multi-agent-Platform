<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NexusAI Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body class="auth-layout container-centered">
    <div class="auth-card glass-panel">
        <div class="brand">
            <h1>Nexus<span class="highlight">AI</span></h1>
            <p>Enterprise Multi-Agent Platform</p>
        </div>
        
        <form id="login-form">
            <div class="input-group">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" id="username" placeholder="Email address" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="primary-btn full-width">Sign In</button>
        </form>

        <div class="divider"><span>OR</span></div>

        <button class="oauth-btn full-width" onclick="window.location.href='/api/v1/auth/google-login'">
            <i class="fa-brands fa-google"></i> Continue with Google
        </button>
        
        <div id="auth-error" class="error-text" style="display: none;"></div>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Create one</a>
        </div>
    </div>

    <script src="js/api.js?v=2"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('auth-error');
            
            try {
                const response = await api.login(username, password);
                if(response.access_token) {
                    localStorage.setItem('access_token', response.access_token);
                    window.location.href = 'index.html';
                }
            } catch (error) {
                errorDiv.innerText = 'Login Failed: Invalid credentials';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
